schema_version: "1.0"

extension:
  id: "tracer-bullet"
  name: "Tracer Bullet Vertical Slice"
  version: "1.0.0"
  description: >
    Registers the after_tasks hook that prompts the AI to run /speckit.tracer
    after task generation, and provides the tracer.md report template.
    The /speckit.tracer command is installed as a core spec-kit command.
  author: "Chris"
  license: "MIT"

requires:
  speckit_version: ">=0.3.0"

provides:
  templates:
    - name: "tracer-template"
      file: "templates/tracer-template.md"
      description: "Template for the tracer bullet report artifact"

hooks:
  after_tasks:
    command: "speckit.tracer"
    optional: true
    prompt: "Run tracer bullet to prove the integration path before full implementation?"
    description: "Identifies and implements the thinnest end-to-end vertical slice after task generation"

tags:
  - "integration"
  - "vertical-slice"
  - "tracer-bullet"
  - "quality"
